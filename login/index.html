<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AetherWave Studio - AI Assistant</title>
  <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Enhanced Glass Effect with Light Reflections */
    .glass-effect {
      background: rgba(10, 10, 10, 0.5);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 
        0 8px 32px 0 rgba(0, 0, 0, 0.5),
        inset 0 1px 0 0 rgba(255, 255, 255, 0.15),
        inset 0 -1px 0 0 rgba(255, 255, 255, 0.05);
      position: relative;
    }

    /* Simulated light reflection on glass */
    .glass-effect::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 40%;
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.15) 0%,
        rgba(255, 255, 255, 0.08) 30%,
        rgba(255, 255, 255, 0) 60%
      );
      border-radius: 12px 12px 0 0;
      pointer-events: none;
    }

    /* Edge highlights */
    .glass-effect::after {
      content: '';
      position: absolute;
      top: 1px;
      left: 1px;
      right: 5px;
      bottom: 5px;
      border-radius: 11px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      pointer-events: none;
    }

    .glass-header {
      background: rgba(15, 15, 15, 0.4);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.1);
    }

    .glass-input {
      background: rgba(20, 20, 20, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 
        inset 0 1px 2px rgba(0, 0, 0, 0.3),
        0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .glass-input:focus {
      background: rgba(25, 25, 25, 0.7);
      border: 1px solid rgba(139, 92, 246, 0.5);
      box-shadow: 
        inset 0 1px 2px rgba(0, 0, 0, 0.3),
        0 0 0 2px rgba(139, 92, 246, 0.2),
        0 1px 0 rgba(255, 255, 255, 0.15);
    }

    /* Glass button with reflection */
    .glass-button {
      background: rgba(30, 30, 30, 0.5);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 
        inset 0 1px 0 rgba(255, 255, 255, 0.15),
        0 2px 8px rgba(0, 0, 0, 0.3);
      position: relative;
    }

    .glass-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(
        180deg,
        rgba(255, 255, 255, 0.12) 0%,
        rgba(255, 255, 255, 0) 100%
      );
      border-radius: 4px 4px 0 0;
      pointer-events: none;
    }

    .glass-button:hover {
      background: rgba(40, 40, 40, 0.6);
      border-color: rgba(255, 255, 255, 0.25);
    }

    /* Message bubble glass effect */
    .message-glass {
      background: rgba(25, 25, 25, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 
        inset 0 1px 0 rgba(255, 255, 255, 0.1),
        0 2px 8px rgba(0, 0, 0, 0.2);
    }

    /* Subtle background animation */
    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(30px, 30px); }
    }

    .floating-orb {
      animation: float 20s ease-in-out infinite;
    }

    .chat-scroll::-webkit-scrollbar {
      width: 4px;
    }
    .chat-scroll::-webkit-scrollbar-track {
      background: rgba(30, 30, 30, 0.3);
    }
    .chat-scroll::-webkit-scrollbar-thumb {
      background: rgba(139, 92, 246, 0.5);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .chat-scroll::-webkit-scrollbar-thumb:hover {
      background: rgba(139, 92, 246, 0.7);
    }
	
	
	body {
  background: url('your-background-image.jpg') no-repeat center/cover; /* Or a gradient like linear-gradient(to right, #000, #333) */
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.glass-card {
  width: 240px;
  height: 360px;
  background: rgba(0, 0, 0, 0.15);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 20px;
  border: 1px solid rgba(0, 0, 0, 0.3);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37), inset 0 1px 0 rgba(0, 0, 0, 0.5), inset 0 -1px 0 rgba(0, 0, 0, 0.1), inset 0 0 20px 10px rgba(0, 0, 0, 1);
  position: relative;
  overflow: hidden;
  color: #fff; /* Light text for dark glass */
  padding: 20px;
  text-align: center;
}

.glass-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0, 0, 0, 0.8), transparent);
}

.glass-card::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 1px;
  height: 100%;
  background: linear-gradient(180deg, rgba(0, 0, 0, 0.8), transparent, rgba(0, 0, 0, 0.3));
}
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    function App() {
      // 🔑 ADD YOUR OPENAI API KEY HERE
      const OPENAI_API_KEY = "sk-your-actual-api-key-here";

      const [showLoginModal, setShowLoginModal] = React.useState(false);
      const [isLogin, setIsLogin] = React.useState(true);
      const [formData, setFormData] = React.useState({
        email: "",
        password: "",
        confirmPassword: "",
        name: "",
      });
      const [messages, setMessages] = React.useState([
        {
          role: "assistant",
          content: "Welcome to AetherWave Studio AI! How can I assist you today?"
        }
      ]);
      const [inputMessage, setInputMessage] = React.useState("");
      const [isTyping, setIsTyping] = React.useState(false);
      const [uploadedFiles, setUploadedFiles] = React.useState([]);
      const chatEndRef = React.useRef(null);
      const fileInputRef = React.useRef(null);

      const suggestionCards = [
        { icon: "🎵", text: "Prompts for Music" },
        { icon: "✍️", text: "Lyrics for a Song" },
        { icon: "ℹ️", text: "Tell me about AetherWave" },
        { icon: "🎨", text: "Draw a Picture" }
      ];

      const openLoginModal = (loginMode) => {
        setIsLogin(loginMode);
        setShowLoginModal(true);
        setFormData({ email: "", password: "", confirmPassword: "", name: "" });
      };

      const closeLoginModal = () => {
        setShowLoginModal(false);
      };

      const handleInputChange = (e) => {
        setFormData({ ...formData, [e.target.name]: e.target.value });
      };

      const handleLoginSubmit = (e) => {
        e.preventDefault();
        if (isLogin) {
          alert("Login successful for " + formData.email);
        } else {
          if (formData.password !== formData.confirmPassword) {
            alert("Passwords do not match!");
            return;
          }
          alert("Account created for " + formData.name);
        }
        closeLoginModal();
      };

      const scrollToBottom = () => {
        chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
      };

      React.useEffect(() => {
        scrollToBottom();
      }, [messages]);

      const handleFileUpload = (e) => {
        const files = Array.from(e.target.files);
        const fileData = files.map(file => ({
          name: file.name,
          size: (file.size / 1024).toFixed(2) + " KB",
          type: file.type
        }));
        setUploadedFiles([...uploadedFiles, ...fileData]);
      };

      const removeFile = (index) => {
        setUploadedFiles(uploadedFiles.filter((_, i) => i !== index));
      };

      // 🤖 REAL OPENAI API INTEGRATION - FIXED
      const handleSendMessage = async (messageText = null) => {
        const textToSend = messageText || inputMessage;
        if (!textToSend.trim() && uploadedFiles.length === 0) return;

        let messageContent = textToSend;
        if (uploadedFiles.length > 0) {
          messageContent += "\n\n📎 Attached files: " + uploadedFiles.map(f => f.name).join(", ");
        }

        const userMessage = { role: "user", content: messageContent };
        setMessages(prev => [...prev, userMessage]);
        setInputMessage("");
        setUploadedFiles([]);
        setIsTyping(true);

        try {
          const response = await fetch("https://api.openai.com/v1/chat/completions", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": `Bearer ${OPENAI_API_KEY}`
            },
            body: JSON.stringify({
              model: "gpt-4",
              messages: [
                {
                  role: "system",
                  content: "You are AetherWave Studio AI Assistant, an expert in music production, AI composition, sound design, and creative audio technology. You help artists create immersive soundscapes and provide guidance on music creation. Be helpful, creative, and enthusiastic about music and audio."
                },
                ...messages,
                userMessage
              ],
              temperature: 0.7,
              max_tokens: 500
            })
          });

          const data = await response.json();
          
          if (data.error) {
            throw new Error(data.error.message);
          }

          const aiResponse = data.choices[0].message.content;
          setMessages(prev => [...prev, { role: "assistant", content: aiResponse }]);
          setIsTyping(false);
          
        } catch (error) {
          console.error("OpenAI API Error:", error);
          setMessages(prev => [...prev, { 
            role: "assistant", 
            content: "Sorry, I encountered an error. Please check your API key and try again."
          }]);
          setIsTyping(false);
        }
      };

      const handleFormSubmit = (e) => {
        e.preventDefault();
        handleSendMessage();
      };

      const handleSuggestionClick = (suggestionText) => {
        handleSendMessage(suggestionText);
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-black via-gray-950 to-black relative overflow-hidden">
          {/* Enhanced floating orbs for depth */}
          <div className="absolute inset-0 overflow-hidden pointer-events-none">
            <div className="floating-orb absolute w-96 h-96 bg-purple-600 rounded-full mix-blend-screen filter blur-3xl opacity-20 top-20 -left-20"></div>
            <div className="floating-orb absolute w-80 h-80 bg-blue-600 rounded-full mix-blend-screen filter blur-3xl opacity-20 bottom-20 -right-20" style={{animationDelay: '10s'}}></div>
            <div className="floating-orb absolute w-64 h-64 bg-indigo-500 rounded-full mix-blend-screen filter blur-3xl opacity-15 top-1/2 left-1/2" style={{animationDelay: '5s'}}></div>
          </div>

          {/* Navigation */}
          <nav className="relative z-10 px-6 py-3 flex justify-between items-center border-b border-gray-800 glass-header">
            <div className="flex items-center gap-2">
              <div className="text-2xl">🎵</div>
              <div>
                <h1 className="text-lg font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400">
                  AetherWave Studio
                </h1>
              </div>
            </div>
            <div className="flex gap-3">
              <button
                onClick={() => openLoginModal(true)}
                className="px-4 py-1.5 text-gray-300 hover:text-white transition-colors text-sm"
              >
                Login
              </button>
              <button
                onClick={() => openLoginModal(false)}
                className="px-4 py-1.5 bg-gradient-to-r from-purple-600 to-blue-600 text-white rounded-lg hover:opacity-90 transition-all text-sm"
              >
                Sign Up
              </button>
            </div>
          </nav>
          {/* Main Chat Interface - Enhanced Glass Effect */}
          <div className="relative z-10 flex items-center justify-center p-6">
            <div className="w-full max-w-2xl h-[70vh] glass-effect rounded-xl shadow-2xl flex flex-col">
              
              {/* Chat Header - Glass */}
              <div className="glass-header px-4 py-3 flex items-center gap-2 rounded-t-xl relative z-10">
                <div className="w-7 h-7 bg-gradient-to-br from-purple-500 to-blue-500 rounded-full flex items-center justify-center text-sm shadow-lg">
                  ✨
                </div>
                <div>
                  <h2 className="text-white text-sm font-medium">AetherWave AI</h2>
                </div>
              </div>

              {/* Messages Area */}
              <div className="flex-1 overflow-y-auto px-4 py-3 space-y-3 chat-scroll relative z-10">
                {messages.map((msg, idx) => (
                  <div
                    key={idx}
                    className={`flex gap-2 ${msg.role === "user" ? "justify-end" : "justify-start"}`}
                  >
                    {msg.role === "assistant" && (
                      <div className="w-6 h-6 bg-gradient-to-br from-purple-500 to-blue-500 rounded-full flex items-center justify-center text-xs flex-shrink-0 shadow-lg">
                        ✨
                      </div>
                    )}
                    <div
                      className={`max-w-md px-3 py-2 rounded-lg ${
                        msg.role === "user"
                          ? "bg-gradient-to-br from-purple-600 to-purple-700 text-white shadow-lg border border-purple-400 border-opacity-30"
                          : "message-glass text-gray-100"
                      }`}
                    >
                      <p className="text-sm leading-relaxed whitespace-pre-line">{msg.content}</p>
                    </div>
                    {msg.role === "user" && (
                      <div className="w-6 h-6 glass-input rounded-full flex items-center justify-center text-xs flex-shrink-0 shadow-lg">
                        👤
                      </div>
                    )}
                  </div>
                ))}
                
                {isTyping && (
                  <div className="flex gap-2 justify-start">
                    <div className="w-6 h-6 bg-gradient-to-br from-purple-500 to-blue-500 rounded-full flex items-center justify-center text-xs shadow-lg">
                      ✨
                    </div>
                    <div className="message-glass px-3 py-2 rounded-lg">
                      <div className="flex gap-1">
                        <div className="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce"></div>
                        <div className="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style={{animationDelay: "0.1s"}}></div>
                        <div className="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style={{animationDelay: "0.2s"}}></div>
                      </div>
                    </div>
                  </div>
                )}
                <div ref={chatEndRef} />
              </div>

              {/* Suggestion Cards - Glass */}
              <div className="px-4 py-2 glass-header rounded-b-xl relative z-10">
                <div className="grid grid-cols-4 gap-1.5 mb-2">
                  {suggestionCards.map((card, idx) => (
                    <button
                      key={idx}
                      onClick={() => handleSuggestionClick(card.text)}
                      className="glass-button px-2 py-1.5 rounded text-white text-xs transition-all flex items-center justify-center"
                      title={card.text}
                    >
                      <span>{card.icon}</span>
                    </button>
                  ))}
                </div>

  <div class="glass-card">
    <!-- Your content here, like text or icons -->
    <h2>Black Glass Card</h2>
    <p>Some frosty content goes here.</p>
  </div>


                {/* Uploaded Files Display */}
                {uploadedFiles.length > 0 && (
                  <div className="mb-2 flex flex-wrap gap-1.5">
                    {uploadedFiles.map((file, idx) => (
                      <div
                        key={idx}
                        className="flex items-center gap-1.5 px-2 py-1 glass-input rounded text-xs text-white"
                      >
                        <span>📎 {file.name}</span>
                        <button
                          onClick={() => removeFile(idx)}
                          className="text-red-400 hover:text-red-300 font-bold text-sm"
                        >
                          ×
                        </button>
                      </div>
                    ))}
                  </div>
                )}

                {/* Input Area - Glass */}
                <form onSubmit={handleFormSubmit} className="flex gap-1.5">
                  <input
                    type="file"
                    ref={fileInputRef}
                    onChange={handleFileUpload}
                    multiple
                    className="hidden"
                    accept="audio/*,image/*,.pdf,.txt,.doc,.docx"
                  />
                  <button
                    type="button"
                    onClick={() => fileInputRef.current.click()}
                    className="glass-button px-3 py-2 rounded text-white transition-all text-sm"
                    title="Upload file"
                  >
                    📎
                  </button>
                  <input
                    type="text"
                    value={inputMessage}
                    onChange={(e) => setInputMessage(e.target.value)}
                    placeholder="Message AetherWave AI..."
                    className="flex-1 px-3 py-2 glass-input text-white text-sm placeholder-gray-400 focus:outline-none transition-all rounded"
                  />
                  <button
                    type="submit"
                    className="px-4 py-2 bg-gradient-to-br from-purple-600 to-purple-700 text-white rounded hover:from-purple-700 hover:to-purple-800 transition-all text-sm shadow-lg border border-purple-400 border-opacity-30"
                  >
                    Send
                  </button>
                </form>
              </div>
            </div>
          </div>

          {/* Login Modal - Enhanced Glass Effect */}
          {showLoginModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-80 backdrop-blur-sm">
              <div className="relative w-full max-w-sm">
                <button
                  onClick={closeLoginModal}
                  className="absolute -top-3 -right-3 w-8 h-8 glass-button rounded-full flex items-center justify-center text-white text-xl z-10 transition-colors shadow-lg"
                >
                  ×
                </button>

                <div className="glass-effect rounded-xl shadow-2xl p-6">
                  <div className="text-center mb-5 relative z-10">
                    <h2 className="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400 mb-1">
                      {isLogin ? "Welcome Back" : "Join AetherWave"}
                    </h2>
                    <p className="text-gray-400 text-xs">AI Music • Human Soul • Immersive Sound</p>
                  </div>

                  <div className="flex mb-4 glass-input rounded-lg p-0.5 relative z-10">
                    <button
                      type="button"
                      onClick={() => setIsLogin(true)}
                      className={`flex-1 py-1.5 px-3 rounded-md transition-all duration-300 text-sm ${
                        isLogin
                          ? "bg-gradient-to-br from-purple-600 to-purple-700 text-white shadow-lg"
                          : "text-gray-400 hover:text-white"
                      }`}
                    >
                      Login
                    </button>
                    <button
                      type="button"
                      onClick={() => setIsLogin(false)}
                      className={`flex-1 py-1.5 px-3 rounded-md transition-all duration-300 text-sm ${
                        !isLogin
                          ? "bg-gradient-to-br from-purple-600 to-purple-700 text-white shadow-lg"
                          : "text-gray-400 hover:text-white"
                      }`}
                    >
                      Sign Up
                    </button>
                  </div>

                  <form onSubmit={handleLoginSubmit} className="space-y-3 relative z-10">
                    {!isLogin && (
                      <div>
                        <label className="block text-gray-300 text-xs font-medium mb-1">
                          Full Name
                        </label>
                        <input
                          type="text"
                          name="name"
                          value={formData.name}
                          onChange={handleInputChange}
                          required={!isLogin}
                          className="w-full px-3 py-2 glass-input text-white text-sm placeholder-gray-500 focus:outline-none transition-all rounded"
                          placeholder="Enter your name"
                        />
                      </div>
                    )}

                    <div>
                      <label className="block text-gray-300 text-xs font-medium mb-1">
                        Email Address
                      </label>
                      <input
                        type="email"
                        name="email"
                        value={formData.email}
                        onChange={handleInputChange}
                        required
                        className="w-full px-3 py-2 glass-input text-white text-sm placeholder-gray-500 focus:outline-none transition-all rounded"
                        placeholder="your@email.com"
                      />
                    </div>

                    <div>
                      <label className="block text-gray-300 text-xs font-medium mb-1">
                        Password
                      </label>
                      <input
                        type="password"
                        name="password"
                        value={formData.password}
                        onChange={handleInputChange}
                        required
                        className="w-full px-3 py-2 glass-input text-white text-sm placeholder-gray-500 focus:outline-none transition-all rounded"
                        placeholder="Enter password"
                      />
                    </div>

                    {!isLogin && (
                      <div>
                        <label className="block text-gray-300 text-xs font-medium mb-1">
                          Confirm Password
                        </label>
                        <input
                          type="password"
                          name="confirmPassword"
                          value={formData.confirmPassword}
                          onChange={handleInputChange}
                          required={!isLogin}
                          className="w-full px-3 py-2 glass-input text-white text-sm placeholder-gray-500 focus:outline-none transition-all rounded"
                          placeholder="Confirm password"
                        />
                      </div>
                    )}

                    {isLogin && (
                      <div className="flex items-center justify-between text-xs">
                        <label className="flex items-center text-gray-400">
                          <input type="checkbox" className="mr-1.5 rounded" />
                          Remember me
                        </label>
                        <a href="#" className="text-purple-400 hover:text-purple-300">
                          Forgot password?
                        </a>
                      </div>
                    )}

                    <button
                      type="submit"
                      className="w-full py-2.5 px-4 bg-gradient-to-br from-purple-600 to-purple-700 text-white text-sm font-semibold rounded hover:from-purple-700 hover:to-purple-800 transition-all shadow-lg border border-purple-400 border-opacity-30"
                    >
                      {isLogin ? "Login" : "Create Account"}
                    </button>
                  </form>

                  <div className="mt-4 text-center relative z-10">
                    <p className="text-gray-400 text-xs">
                      {isLogin ? "Don't have an account? " : "Already have an account? "}
                      <button
                        type="button"
                        onClick={() => setIsLogin(!isLogin)}
                        className="text-purple-400 hover:text-purple-300 font-medium"
                      >
                        {isLogin ? "Sign up" : "Login"}
                      </button>
                    </p>
                  </div>

                  <div className="mt-4 relative z-10">
                    <div className="relative">
                      <div className="absolute inset-0 flex items-center">
                        <div className="w-full border-t border-gray-700 border-opacity-30"></div>
                      </div>
                      <div className="relative flex justify-center text-xs">
                        <span className="px-2 glass-input text-gray-400">Or continue with</span>
                      </div>
                    </div>

                    <div className="mt-3 grid grid-cols-2 gap-2">
                      <button type="button" className="glass-button flex items-center justify-center px-3 py-2 rounded text-white transition-all text-xs">
                        <span className="mr-1.5">G</span> Google
                      </button>
                      <button type="button" className="glass-button flex items-center justify-center px-3 py-2 rounded text-white transition-all text-xs">
                        <span className="mr-1.5">⚡</span> GitHub
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
